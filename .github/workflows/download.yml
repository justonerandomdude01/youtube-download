name: Download YouTube Videos

on:
  push:
    paths: ["videos.json"]
  workflow_dispatch:

concurrency:
  group: youtube-download
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Deno (JavaScript runtime for yt-dlp)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install yt-dlp
        run: |
          pip install --upgrade yt-dlp
          yt-dlp --version

      - name: Write cookies file (Clean version without comments)
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            # Remove comments and empty lines, save clean cookies
            echo "$YOUTUBE_COOKIES" | grep -v '^#' | grep -v '^$' > /tmp/yt-cookies.txt
            echo "COOKIES_FILE=/tmp/yt-cookies.txt" >> $GITHUB_ENV
          
            COOKIE_LINES=$(wc -l < /tmp/yt-cookies.txt)
            echo "✓ Cookies configured ($COOKIE_LINES lines)"
          
            # Verify critical cookies exist
            if grep -q "LOGIN_INFO" /tmp/yt-cookies.txt; then
              echo "✓ LOGIN_INFO cookie found (authenticated)"
            else
              echo "⚠ WARNING: No LOGIN_INFO cookie - may not be authenticated"
            fi
          
            if grep -q "VISITOR_INFO1_LIVE" /tmp/yt-cookies.txt; then
              echo "✓ VISITOR_INFO1_LIVE cookie found"
            fi
          
            # Show first 3 non-comment lines for debugging (without exposing sensitive values)
            echo "Cookie domains found:"
            grep -o '^[^\t]*' /tmp/yt-cookies.txt | head -5 | sed 's/.*/  - &/'
          else
            echo "⚠ No cookies provided - downloads may be rate-limited or fail"
          fi

      - name: Test yt-dlp with cookies and Deno
        run: |
          echo "Testing yt-dlp configuration with a public video..."
          
          if [ -f "$COOKIES_FILE" ]; then
            echo "Using cookies from: $COOKIES_FILE"
            yt-dlp --cookies "$COOKIES_FILE" \
              --js-runtimes deno \
              --remote-components ejs:npm \
              --extractor-args "youtube:player_client=web" \
              --simulate \
              "https://www.youtube.com/watch?v=jNQXAC9IVRw" 2>&1 | tee test.log
          
            if grep -q "Sign in to confirm" test.log; then
              echo "❌ Cookie authentication failed - cookies may be expired"
              exit 1
            elif grep -q "n challenge" test.log; then
              echo "❌ JavaScript challenge failed"
              exit 1
            else
              echo "✅ Test successful - cookies working"
            fi
          else
            echo "⚠ No cookies file to test"
          fi

      - name: Process pending videos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python scripts/process.py

      - name: Commit updated videos.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos.json
          git diff --staged --quiet || \
            git commit -m "chore: update download statuses [skip ci]" && \
            git push